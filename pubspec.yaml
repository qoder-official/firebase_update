version: 1.0.0
homepage: https://qoder.in/resources/firebase-update
repository: https://github.com/qoder-official/firebase-update
issue_tracker: https://github.com/qoder-official/firebase-update/issues
documentation: https://github.com/qoder-official/firebase-update#readme

environment:
  sdk: ^3.2.0
  flutter: ">=1.17.0"

dependencies:
  app_review: ">=3.0.0 <5.0.0"
  firebase_core: ">=4.5.0 <6.0.0"
  firebase_remote_config: ">=6.2.0 <9.0.0"
  flutter:
    sdk: flutter
  flutter_html: '>=3.0.0 <4.0.0'
  package_info_plus: ^9.0.0
  url_launcher: ">=6.2.5 <7.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ">=4.0.0 <7.0.0"

